<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vibefy — Mood-to-Music Generator</title>
  <meta name="description" content="Describe your vibe in words and get a perfectly matched playlist with Spotify links, powered by AI." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <!-- Landing Page -->
    <div id="landing-page" class="page active">
      <div class="noise-overlay"></div>

      <!-- Floating orbs background -->
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="orb orb-3"></div>

      <!-- Floating music symbols -->
      <div class="music-note note-1">♪</div>
      <div class="music-note note-2">♫</div>
      <div class="music-note note-3">♩</div>
      <div class="music-note note-4">♬</div>
      <div class="music-note note-5">♭</div>
      <div class="music-note note-6">♯</div>

      <header class="hero-header">
        <div class="logo">
          <span class="logo-icon">🎵</span>
          <span class="logo-text">Vibefy</span>
        </div>
      </header>

      <main class="hero-main">
        <div class="hero-content">
          <div class="badge">AI-Powered Playlist Generator</div>
          <h1 class="hero-title">
            What's your<br/>
            <span class="gradient-text">vibe right now?</span>
          </h1>
          <p class="hero-subtitle">Describe your mood, moment, or situation — we'll craft the perfect playlist for it.</p>

          <div class="input-container">
            <!-- Input mode tabs -->
            <div class="input-tabs">
              <button class="tab-btn active" id="tab-text" onclick="switchTab('text')">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                Describe It
              </button>
              <button class="tab-btn" id="tab-dropdowns" onclick="switchTab('dropdowns')">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
                Quick Pick
              </button>
              <button class="tab-btn" id="tab-mixed" onclick="switchTab('mixed')">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
                Mix & Match
              </button>
            </div>

            <!-- Text input tab -->
            <div class="tab-content" id="content-text">
              <div class="textarea-wrapper">
                <textarea
                  id="mood-text"
                  placeholder="e.g. I'm studying for a final exam at 2 AM while it rains outside and I need to focus..."
                  rows="4"
                  maxlength="300"
                ></textarea>
                <div class="char-counter"><span id="char-count">0</span>/300</div>
              </div>
              <div class="example-chips">
                <span class="chip-label">Try:</span>
                <button class="example-chip" onclick="fillExample(this)">☕ Morning coffee & calm</button>
                <button class="example-chip" onclick="fillExample(this)">🏋️ Post-workout unstoppable</button>
                <button class="example-chip" onclick="fillExample(this)">🌧️ Rainy day studying</button>
                <button class="example-chip" onclick="fillExample(this)">💔 Heartbreak healing</button>
                <button class="example-chip" onclick="fillExample(this)">🎉 Party pre-game hype</button>
              </div>
            </div>

            <!-- Dropdowns tab -->
            <div class="tab-content hidden" id="content-dropdowns">
              <div class="dropdowns-grid">
                <div class="dropdown-group">
                  <label>😄 Mood</label>
                  <select id="dd-mood" class="styled-select">
                    <option value="">Select mood...</option>
                    <option>Happy & Uplifted</option>
                    <option>Sad & Melancholic</option>
                    <option>Energized & Pumped</option>
                    <option>Calm & Peaceful</option>
                    <option>Focused & Productive</option>
                    <option>Romantic & Dreamy</option>
                    <option>Angry & Intense</option>
                    <option>Nostalgic & Reflective</option>
                    <option>Anxious & Restless</option>
                    <option>Hopeful & Inspired</option>
                  </select>
                </div>
                <div class="dropdown-group">
                  <label>🕐 Time of Day</label>
                  <select id="dd-time" class="styled-select">
                    <option value="">Select time...</option>
                    <option>Early Morning (5–9 AM)</option>
                    <option>Morning (9 AM–12 PM)</option>
                    <option>Afternoon (12–5 PM)</option>
                    <option>Evening (5–9 PM)</option>
                    <option>Night (9 PM–12 AM)</option>
                    <option>Late Night (12–5 AM)</option>
                  </select>
                </div>
                <div class="dropdown-group">
                  <label>🌦️ Weather</label>
                  <select id="dd-weather" class="styled-select">
                    <option value="">Select weather...</option>
                    <option>Sunny & Bright</option>
                    <option>Raining & Stormy</option>
                    <option>Cloudy & Overcast</option>
                    <option>Cold & Snowy</option>
                    <option>Warm & Breezy</option>
                    <option>Foggy & Misty</option>
                  </select>
                </div>
                <div class="dropdown-group">
                  <label>⚡ Activity</label>
                  <select id="dd-activity" class="styled-select">
                    <option value="">Select activity...</option>
                    <option>Studying / Working</option>
                    <option>Working Out</option>
                    <option>Commuting / Driving</option>
                    <option>Party / Socializing</option>
                    <option>Relaxing at Home</option>
                    <option>Cooking / Cleaning</option>
                    <option>Running / Jogging</option>
                    <option>Reading</option>
                    <option>Meditating</option>
                    <option>Heartbreak / Crying</option>
                  </select>
                </div>
                <div class="dropdown-group">
                  <label>🎸 Genre Hint</label>
                  <select id="dd-genre" class="styled-select">
                    <option value="">Any genre...</option>
                    <option>Lo-fi / Chillhop</option>
                    <option>Pop</option>
                    <option>Hip-Hop / Rap</option>
                    <option>Indie / Alternative</option>
                    <option>Electronic / EDM</option>
                    <option>R&B / Soul</option>
                    <option>Rock</option>
                    <option>Classical</option>
                    <option>Jazz</option>
                    <option>K-Pop</option>
                    <option>Metal</option>
                  </select>
                </div>
                <div class="dropdown-group">
                  <label>🔥 Energy</label>
                  <select id="dd-energy" class="styled-select">
                    <option value="">Select energy...</option>
                    <option>Ultra Low — Sleepy</option>
                    <option>Low — Calm</option>
                    <option>Medium — Balanced</option>
                    <option>High — Energetic</option>
                    <option>Ultra High — Explosive</option>
                  </select>
                </div>
              </div>
            </div>

            <!-- Mixed tab -->
            <div class="tab-content hidden" id="content-mixed">
              <div class="mixed-layout">
                <div class="mixed-text-side">
                  <div class="textarea-wrapper">
                    <textarea
                      id="mood-text-mixed"
                      placeholder="Add extra details... (optional)"
                      rows="3"
                      maxlength="200"
                    ></textarea>
                  </div>
                </div>
                <div class="mixed-dropdowns-side">
                  <div class="dropdown-group small">
                    <label>😄 Mood</label>
                    <select id="md-mood" class="styled-select">
                      <option value="">Any...</option>
                      <option>Happy</option>
                      <option>Sad</option>
                      <option>Energized</option>
                      <option>Calm</option>
                      <option>Focused</option>
                      <option>Romantic</option>
                      <option>Angry</option>
                      <option>Nostalgic</option>
                    </select>
                  </div>
                  <div class="dropdown-group small">
                    <label>⚡ Activity</label>
                    <select id="md-activity" class="styled-select">
                      <option value="">Any...</option>
                      <option>Studying</option>
                      <option>Workout</option>
                      <option>Driving</option>
                      <option>Party</option>
                      <option>Relaxing</option>
                      <option>Running</option>
                    </select>
                  </div>
                  <div class="dropdown-group small">
                    <label>🎸 Genre</label>
                    <select id="md-genre" class="styled-select">
                      <option value="">Any...</option>
                      <option>Lo-fi</option>
                      <option>Pop</option>
                      <option>Hip-Hop</option>
                      <option>Indie</option>
                      <option>Electronic</option>
                      <option>R&B</option>
                      <option>Rock</option>
                      <option>Jazz</option>
                    </select>
                  </div>
                  <div class="dropdown-group small">
                    <label>🔥 Energy</label>
                    <select id="md-energy" class="styled-select">
                      <option value="">Any...</option>
                      <option>Low</option>
                      <option>Medium</option>
                      <option>High</option>
                    </select>
                  </div>
                </div>
              </div>
            </div>

            <button class="generate-btn" id="generate-btn" onclick="generatePlaylist()">
              <span class="btn-text">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                Generate My Playlist
              </span>
              <div class="btn-shimmer"></div>
            </button>
          </div>
        </div>
      </main>

      <!-- Loading overlay -->
      <div class="loading-overlay hidden" id="loading-overlay">
        <div class="loading-content">
          <div class="waveform">
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
          </div>
          <p class="loading-title">Tuning into your vibe…</p>
          <p class="loading-subtitle" id="loading-status">Analyzing your mood with AI</p>
        </div>
      </div>
    </div>

    <!-- Playlist Page -->
    <div id="playlist-page" class="page">
      <div class="noise-overlay"></div>
      <div id="playlist-bg-gradient" class="playlist-bg"></div>

      <div class="playlist-container">
        <header class="playlist-header">
          <button class="back-btn" onclick="goBack()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
            New Vibe
          </button>
          <div class="logo small">
            <span class="logo-icon">🎵</span>
            <span class="logo-text">Vibefy</span>
          </div>
        </header>

        <div class="playlist-hero">
          <div class="vibe-badge" id="vibe-badge">Your Vibe</div>
          <h2 id="playlist-title" class="playlist-title"></h2>
          <p id="playlist-desc" class="playlist-desc"></p>
          <div class="playlist-meta" id="playlist-meta"></div>
        </div>

        <div id="tracks-grid" class="tracks-grid"></div>

        <div class="playlist-footer">
          <button class="generate-btn outline" onclick="goBack()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10M23 14l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
            Try Another Mood
          </button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="src/app.js"></script>
</body>
</html>
